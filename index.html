 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Website Hub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111;
    color:white;
    min-height:100vh;
}

header{
    text-align:center;
    padding:50px 20px 30px;
}

header h1{
    font-size:3rem;
    color:#4da6ff;
    margin-bottom:10px;
}

header p{
    color:#bdbdbd;
    font-size:1.1rem;
}

.container{
    width:90%;
    max-width:900px;
    margin:40px auto;
}

.section{
    background:#1b1b1b;
    border:1px solid #333;
    border-radius:15px;
    padding:25px;
    margin-bottom:35px;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.section h2{
    color:#4da6ff;
    margin-bottom:20px;
    font-size:2rem;
}

.website{
    margin:18px 0;
}

.website a{
    display:block;
    text-decoration:none;
    color:white;
    background:#2c2c2c;
    padding:15px;
    border-radius:10px;
    transition:0.3s;
    word-break:break-all;
}

.website a:hover{
    background:#4da6ff;
    color:black;
    transform:translateX(8px);
}

footer{
    text-align:center;
    color:#888;
    padding:30px;
    font-size:0.9rem;
}
</style>

</head>
<body>

<header>
    <h1>The Website Hub</h1>
    <p>All websites here were created by Arihant Walia.</p>
</header>

<div class="container">

    <div class="section">
        <h2>🎮 Games</h2>

        <div class="website">
            <a href="https://thephoenix-nu.vercel.app/" target="_blank">
                The Phoenix
            </a>
        </div>

        <div class="website">
            <a href="https://mine-cave-craft-trial.vercel.app/" target="_blank">
                Minetrials of Caves and Crafts
            </a>
        </div>
     <div class="website">
    <a href="https://foodsimulator.vercel.app/" target="_blank">
        Food Empire
    </a>
</div>

        <div class="website">
            <a href="https://islandconquest.vercel.app/" target="_blank">
                Island Conquest
            </a>
        </div>

    </div>

    <div class="section">
        <h2>🌐 Other Websites</h2>

        <div class="website">
            <a href="https://arihantw-github-io.vercel.app/" target="_blank">
                The Buster Website
            </a>
        </div>

        <div class="website">
            <a href="https://arihantomniai.vercel.app/" target="_blank">
                Arihant Omni AI
            </a>
        </div>

    </div>

</div>

<footer>
    © 2026 Arihant Walia
</footer>

</body>
</html>
